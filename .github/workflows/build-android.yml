# Simple workflow for building Ampersand as an Android application
name: Build for Android

on:
  workflow_call:
    inputs:
      upload_url:
        type: string
        required: true
    secrets:
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_KEY_BASE64:
        required: true
      ANDROID_STORE_PASSWORD:
        required: true

# Sets the GITHUB_TOKEN permissions to allow deployment
permissions:
  contents: write

concurrency:
  group: ${{ github.ref_name == 'main' && 'build-android-dev' || 'build-android-release' }}
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 12266719
          packages: "platform-tools ndk;29.0.14206865"
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          rust-src-dir: "src-tauri"
          target: "aarch64-linux-android,armv7-linux-androideabi"
      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile
      - name: Update versioning
        run: yarn run upgrade-vcs
      - name: Set up Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > local.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> local.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> local.properties
      - name: Build app (APK)
        run: |
          yarn tauri android build --apk --target aarch64 armv7 --split-per-abi --ci
          yarn tauri android build --apk --target aarch64 armv7 --ci
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865/
      - name: Build app (AAB)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          yarn tauri android build --aab --target aarch64 armv7 --ci
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865/
      - name: Publish artifact (APK - ARMv7)
        uses: actions/upload-artifact@v7
        with:
          name: Android App (APK - ARMv7)
          archive: false
          path: |
            ./src-tauri/gen/android/app/build/outputs/apk/arm/release/ampersand*-arm-release.apk
      - name: Publish artifact (APK - ARM64)
        uses: actions/upload-artifact@v7
        with:
          name: Android App (APK - ARM64)
          archive: false
          path: |
            ./src-tauri/gen/android/app/build/outputs/apk/arm64/release/ampersand*-arm64-release.apk
      - name: Publish artifact (APK - Universal)
        uses: actions/upload-artifact@v7
        with:
          name: Android App (APK - Universal)
          archive: false
          path: |
            ./src-tauri/gen/android/app/build/outputs/apk/universal/release/ampersand*-universal-release.apk
      - name: Publish artifact (AAB)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: Android Application Bundle (AAB)
          archive: false
          path: |
            ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/ampersand*-universal-release.aab
      - name: Publish to release (APK)
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ inputs.upload_url }}
          asset_path: ./src-tauri/gen/android/app/build/outputs/apk/*/release/ampersand-*-release.apk
      - name: Publish to release (AAB)
        if: startsWith(github.ref, 'refs/tags/')
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ inputs.upload_url }}
          asset_path: ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/ampersand-*-release.aab
